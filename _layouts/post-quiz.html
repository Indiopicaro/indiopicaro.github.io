---
layout: post
---

{{ content }}

{% if page.quiz %}
<div class="quiz-section">
  <button class="open-quiz-btn">Realizar Evaluación</button>

  <div id="quiz-modal" class="modal">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <div class="quiz-container">
        <h3 id="quiz-title">Cargando preguntas...</h3>
        <div id="quiz-questions"></div>
        <button class="check-answers">Verificar Respuestas</button>
        <div id="score-display" class="score-display hidden"></div>
      </div>
    </div>
  </div>

  <style>
  .open-quiz-btn {
    background-color: var(--link-color);
    color: white;
    border: none;
    padding: 0.75rem 1.5rem;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 500;
    font-size: 1.1rem;
    margin: 1rem 0;
  }

  .open-quiz-btn:hover {
    opacity: 0.9;
  }

  .modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.7);
    overflow-y: auto;
  }

  .modal-content {
    background-color: var(--card-bg);
    margin: 2% auto;
    padding: 1.5rem;
    border-radius: 8px;
    width: 90%;
    max-width: 800px;
    position: relative;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  }

  .close-modal {
    position: absolute;
    right: 1rem;
    top: 0.5rem;
    font-size: 1.5rem;
    cursor: pointer;
    color: var(--text-color);
    opacity: 0.7;
    transition: opacity 0.2s;
  }

  .close-modal:hover {
    opacity: 1;
  }

  .quiz-container {
    padding: 0;
  }

  #quiz-title {
    font-size: 1.5rem;
    margin: 0 0 1.5rem 0;
    color: var(--text-color);
  }

  .quiz-question {
    margin-bottom: 2rem;
  }

  .question-text {
    font-weight: 600;
    margin-bottom: 1rem;
    font-size: 1.1rem;
    color: var(--text-color);
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
  }

  .option {
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .option input[type="radio"] {
    margin: 0;
    width: 18px;
    height: 18px;
  }

  .option label {
    cursor: pointer;
    font-size: 1rem;
    color: var(--text-color);
  }

  .feedback {
    margin-top: 1rem;
    padding: 0.8rem 1.2rem;
    border-radius: 6px;
    font-size: 1rem;
  }

  .feedback.correct {
    background-color: #4caf50;
    color: white;
  }

  .feedback.incorrect {
    background-color: #f44336;
    color: white;
  }

  .hidden {
    display: none !important;
  }

  .score-display {
    margin-top: 1.5rem;
    text-align: center;
    font-size: 1.2rem;
    font-weight: 600;
    padding: 1rem;
    border-radius: 6px;
  }

  .score-display.perfect {
    background-color: #4caf50;
    color: white;
  }

  .score-display.incomplete {
    background-color: #ff9800;
    color: white;
  }

  .check-answers {
    background-color: var(--link-color);
    color: white;
    border: none;
    padding: 0.8rem 1.5rem;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 500;
    margin-top: 2rem;
    font-size: 1rem;
  }

  .check-answers:hover {
    opacity: 0.9;
  }
  </style>

  <script>
  document.addEventListener('DOMContentLoaded', function() {
    console.log('DOM cargado');
    
    const modal = document.getElementById('quiz-modal');
    const openBtn = document.querySelector('.open-quiz-btn');
    const closeBtn = document.querySelector('.close-modal');
    const quizTitle = document.getElementById('quiz-title');
    const quizQuestions = document.getElementById('quiz-questions');

    // Verificar que los elementos existen
    if (!modal) console.error('No se encontró el modal');
    if (!openBtn) console.error('No se encontró el botón abrir');
    if (!closeBtn) console.error('No se encontró el botón cerrar');
    if (!quizTitle) console.error('No se encontró el título del quiz');
    if (!quizQuestions) console.error('No se encontró el contenedor de preguntas');

    // Función para abrir el modal
    function openModal() {
      console.log('Abriendo modal');
      modal.style.display = 'block';
      document.body.style.overflow = 'hidden';
    }

    // Función para cerrar el modal
    function closeModal() {
      console.log('Cerrando modal');
      modal.style.display = 'none';
      document.body.style.overflow = 'auto';
    }

    // Agregar event listeners
    openBtn.addEventListener('click', openModal);
    closeBtn.addEventListener('click', closeModal);
    window.addEventListener('click', function(event) {
      if (event.target === modal) {
        closeModal();
      }
    });

    // Cargar preguntas
    try {
      {% assign quiz_name = page.questions | remove: '.yml' %}
      const quizData = {{ site.data[quiz_name] | jsonify }};
      console.log('Datos del quiz:', quizData);

      if (!quizData) {
        throw new Error('No se pudieron cargar los datos del quiz');
      }

      if (!quizData.questions || !Array.isArray(quizData.questions)) {
        throw new Error('El formato del quiz no es válido');
      }
      
      quizTitle.textContent = quizData.title || 'Cuestionario';
      
      quizData.questions.forEach((question, index) => {
        const questionDiv = document.createElement('div');
        questionDiv.className = 'quiz-question';
        questionDiv.dataset.correctAnswer = question.correct_answer;
        questionDiv.dataset.explanation = question.explanation;
        
        questionDiv.innerHTML = `
          <p class="question-text">${question.question}</p>
          <div class="options">
            ${question.options.map((option, optionIndex) => `
              <div class="option">
                <input type="radio" 
                       name="question_${index}" 
                       id="q${index}_${optionIndex}"
                       value="${optionIndex}">
                <label for="q${index}_${optionIndex}">${option}</label>
              </div>
            `).join('')}
          </div>
          <div class="feedback hidden"></div>
        `;
        
        quizQuestions.appendChild(questionDiv);
      });

      // Agregar event listener para verificar respuestas
      document.querySelector('.check-answers').addEventListener('click', function() {
        console.log('Verificando respuestas');
        const questions = document.querySelectorAll('.quiz-question');
        let correctCount = 0;
        const totalQuestions = questions.length;
        
        questions.forEach((question) => {
          const selectedOption = question.querySelector('input[type="radio"]:checked');
          const feedback = question.querySelector('.feedback');
          const correctAnswer = parseInt(question.dataset.correctAnswer);
          
          if (selectedOption) {
            const isCorrect = parseInt(selectedOption.value) === correctAnswer;
            feedback.classList.remove('hidden');
            feedback.className = `feedback ${isCorrect ? 'correct' : 'incorrect'}`;
            feedback.textContent = isCorrect ? 
              '¡Correcto! ' + question.dataset.explanation :
              'Incorrecto. Intenta de nuevo.';
            if (isCorrect) {
              correctCount++;
            }
          } else {
            feedback.classList.remove('hidden');
            feedback.className = 'feedback incorrect';
            feedback.textContent = 'Por favor, selecciona una respuesta.';
          }
        });

        // Mostrar el contador de respuestas correctas
        const scoreDisplay = document.getElementById('score-display');
        scoreDisplay.classList.remove('hidden');
        
        if (correctCount === totalQuestions) {
          scoreDisplay.className = 'score-display perfect';
          scoreDisplay.textContent = `¡Felicitaciones! Has obtenido ${correctCount}/${totalQuestions} respuestas correctas.`;
        } else {
          scoreDisplay.className = 'score-display incomplete';
          scoreDisplay.textContent = `¡Sigue intentando! Has obtenido ${correctCount}/${totalQuestions} respuestas correctas.`;
        }
      });

    } catch (error) {
      console.error('Error al cargar el quiz:', error);
      quizTitle.textContent = 'Error al cargar el cuestionario';
      quizQuestions.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
    }
  });
  </script>
</div>
{% endif %}
