---
layout: post
---

{{ content }}

{% if page.quiz %}
<div class="quiz-section">
  <button class="open-quiz-btn">Realizar Evaluación</button>

  <div id="quiz-modal" class="modal">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <div class="quiz-container">
        <h3 id="quiz-title">Cargando preguntas...</h3>
        <div id="quiz-questions"></div>
        <div id="quiz-score" class="hidden"></div>
        <button class="check-answers">Verificar Respuestas</button>
      </div>
    </div>
  </div>

  <style>
  .open-quiz-btn {
    background-color: var(--link-color);
    color: white;
    border: none;
    padding: 0.75rem 1.5rem;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 500;
    font-size: 1.1rem;
    margin: 1rem 0;
  }

  .open-quiz-btn:hover {
    opacity: 0.9;
  }

  .modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.7);
    overflow-y: auto;
  }

  .modal-content {
    background-color: var(--card-bg);
    margin: 2% auto;
    padding: 1.5rem;
    border-radius: 8px;
    width: 90%;
    max-width: 800px;
    position: relative;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  }

  .close-modal {
    position: absolute;
    right: 1rem;
    top: 0.5rem;
    font-size: 1.5rem;
    cursor: pointer;
    color: var(--text-color);
    opacity: 0.7;
    transition: opacity 0.2s;
  }

  .close-modal:hover {
    opacity: 1;
  }

  .quiz-container {
    padding: 0;
  }

  #quiz-title {
    font-size: 1.5rem;
    margin: 0 0 1.5rem 0;
    color: var(--text-color);
  }

  .quiz-question {
    margin-bottom: 2rem;
  }

  .question-text {
    font-weight: 600;
    margin-bottom: 1rem;
    font-size: 1.1rem;
    color: var(--text-color);
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
  }

  .option {
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .option input[type="radio"] {
    margin: 0;
    width: 18px;
    height: 18px;
  }

  .option label {
    cursor: pointer;
    font-size: 1rem;
    color: var(--text-color);
  }

  .feedback {
    margin-top: 1rem;
    padding: 0.8rem 1.2rem;
    border-radius: 6px;
    font-size: 1rem;
  }

  .feedback.correct {
    background-color: #4caf50;
    color: white;
  }

  .feedback.incorrect {
    background-color: #f44336;
    color: white;
  }

  .hidden {
    display: none !important;
  }

  .check-answers {
    background-color: var(--link-color);
    color: white;
    border: none;
    padding: 0.8rem 1.5rem;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 500;
    margin-top: 2rem;
    font-size: 1rem;
  }

  .check-answers:hover {
    opacity: 0.9;
  }

  .quiz-score {
    margin-top: 1rem;
    padding: 1rem;
    border-radius: 6px;
    text-align: center;
    font-size: 1.2rem;
    font-weight: 600;
  }

  .quiz-score.partial {
    background-color: #ff9800;
    color: white;
  }

  .quiz-score.perfect {
    background-color: #4caf50;
    color: white;
  }
  </style>

  <!-- Cargar el archivo quiz.js -->
  <script src="{{ '/assets/js/quiz.js' | relative_url }}"></script>

  <!-- Inicializar el quiz después de cargar quiz.js -->
  <script>
    window.addEventListener('load', function() {
      {% assign quiz_name = page.questions | remove: '.yml' %}
      const quizData = {{ site.data[quiz_name] | jsonify }};
      if (typeof initQuiz === 'function') {
        initQuiz(quizData);
      } else {
        console.error('La función initQuiz no está disponible');
      }
    });
  </script>
</div>
{% endif %}
