---
layout: post
---

{{ content }}

{% if page.quiz %}
<div class="quiz-section">
  <button class="open-quiz-btn">Realizar Evaluación</button>

  <div id="quiz-modal" class="modal">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <div class="quiz-container">
        <h3 id="quiz-title">Cargando preguntas...</h3>
        <div id="quiz-questions"></div>
        <div id="quiz-score" class="hidden"></div>
        <button class="check-answers">Verificar Respuestas</button>
      </div>
    </div>
  </div>

  <style>
  .open-quiz-btn {
    background-color: var(--link-color);
    color: white;
    border: none;
    padding: 0.75rem 1.5rem;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 500;
    font-size: 1.1rem;
    margin: 1rem 0;
  }

  .open-quiz-btn:hover {
    opacity: 0.9;
  }

  .modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.7);
    overflow-y: auto;
  }

  .modal-content {
    background-color: var(--card-bg);
    margin: 2% auto;
    padding: 1.5rem;
    border-radius: 8px;
    width: 90%;
    max-width: 800px;
    position: relative;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  }

  .close-modal {
    position: absolute;
    right: 1rem;
    top: 0.5rem;
    font-size: 1.5rem;
    cursor: pointer;
    color: var(--text-color);
    opacity: 0.7;
    transition: opacity 0.2s;
  }

  .close-modal:hover {
    opacity: 1;
  }

  .quiz-container {
    padding: 0;
  }

  #quiz-title {
    font-size: 1.5rem;
    margin: 0 0 1.5rem 0;
    color: var(--text-color);
  }

  .quiz-question {
    margin-bottom: 2rem;
  }

  .question-text {
    font-weight: 600;
    margin-bottom: 1rem;
    font-size: 1.1rem;
    color: var(--text-color);
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
  }

  .option {
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .option input[type="radio"] {
    margin: 0;
    width: 18px;
    height: 18px;
  }

  .option label {
    cursor: pointer;
    font-size: 1rem;
    color: var(--text-color);
  }

  .feedback {
    margin-top: 1rem;
    padding: 0.8rem 1.2rem;
    border-radius: 6px;
    font-size: 1rem;
  }

  .feedback.correct {
    background-color: #4caf50;
    color: white;
  }

  .feedback.incorrect {
    background-color: #f44336;
    color: white;
  }

  .hidden {
    display: none !important;
  }

  .check-answers {
    background-color: var(--link-color);
    color: white;
    border: none;
    padding: 0.8rem 1.5rem;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 500;
    margin-top: 2rem;
    font-size: 1rem;
  }

  .check-answers:hover {
    opacity: 0.9;
  }

  .quiz-score {
    margin-top: 1rem;
    padding: 1rem;
    border-radius: 6px;
    text-align: center;
    font-size: 1.2rem;
    font-weight: 600;
  }

  .quiz-score.partial {
    background-color: #ff9800;
    color: white;
  }

  .quiz-score.perfect {
    background-color: #4caf50;
    color: white;
  }
  </style>

  <script>
    (function() {
      // Asegurarse de que el script se ejecute después de que el DOM esté completamente cargado
      function initQuiz() {
        console.log('Inicializando quiz');
        
        const modal = document.getElementById('quiz-modal');
        const openBtn = document.querySelector('.open-quiz-btn');
        const closeBtn = document.querySelector('.close-modal');
        const quizTitle = document.getElementById('quiz-title');
        const quizQuestions = document.getElementById('quiz-questions');

        if (!modal || !openBtn || !closeBtn || !quizTitle || !quizQuestions) {
          console.error('No se encontraron elementos necesarios del quiz');
          return;
        }

        function openModal() {
          console.log('Abriendo modal');
          modal.style.display = 'block';
          document.body.style.overflow = 'hidden';
        }

        function closeModal() {
          console.log('Cerrando modal');
          modal.style.display = 'none';
          document.body.style.overflow = 'auto';
        }

        openBtn.addEventListener('click', openModal);
        closeBtn.addEventListener('click', closeModal);
        window.addEventListener('click', function(event) {
          if (event.target === modal) {
            closeModal();
          }
        });

        try {
          {% assign quiz_name = page.questions | remove: '.yml' %}
          const quizData = {{ site.data[quiz_name] | jsonify }};
          console.log('Datos del quiz:', quizData);

          if (!quizData || !quizData.questions || !Array.isArray(quizData.questions)) {
            throw new Error('El formato del quiz no es válido');
          }

          quizTitle.textContent = quizData.title || 'Cuestionario';
          quizQuestions.innerHTML = ''; // Limpiar contenedor antes de agregar preguntas
          
          quizData.questions.forEach((question, index) => {
            const questionDiv = document.createElement('div');
            questionDiv.className = 'quiz-question';
            questionDiv.dataset.correctAnswer = question.correct_answer;
            questionDiv.dataset.explanation = question.explanation;
            
            questionDiv.innerHTML = `
              <p class="question-text">${question.question}</p>
              <div class="options">
                ${question.options.map((option, optionIndex) => `
                  <div class="option">
                    <input type="radio" 
                           name="question_${index}" 
                           id="q${index}_${optionIndex}"
                           value="${optionIndex}">
                    <label for="q${index}_${optionIndex}">${option}</label>
                  </div>
                `).join('')}
              </div>
              <div class="feedback hidden"></div>
            `;
            
            quizQuestions.appendChild(questionDiv);
          });

          const checkAnswersBtn = document.querySelector('.check-answers');
          if (checkAnswersBtn) {
            checkAnswersBtn.addEventListener('click', function() {
              console.log('Verificando respuestas');
              const questions = document.querySelectorAll('.quiz-question');
              let correctAnswers = 0;
              const totalQuestions = questions.length;
              
              questions.forEach((question) => {
                const selectedOption = question.querySelector('input[type="radio"]:checked');
                const feedback = question.querySelector('.feedback');
                const correctAnswer = parseInt(question.dataset.correctAnswer);
                
                if (selectedOption) {
                  const isCorrect = parseInt(selectedOption.value) === correctAnswer;
                  feedback.classList.remove('hidden');
                  feedback.className = `feedback ${isCorrect ? 'correct' : 'incorrect'}`;
                  feedback.textContent = isCorrect ? 
                    '¡Correcto! ' + question.dataset.explanation :
                    'Incorrecto. Intenta de nuevo.';
                  if (isCorrect) {
                    correctAnswers++;
                  }
                } else {
                  feedback.classList.remove('hidden');
                  feedback.className = 'feedback incorrect';
                  feedback.textContent = 'Por favor, selecciona una respuesta.';
                }
              });

              const scoreDiv = document.getElementById('quiz-score');
              if (scoreDiv) {
                scoreDiv.classList.remove('hidden');
                
                if (correctAnswers === totalQuestions) {
                  scoreDiv.className = 'quiz-score perfect';
                  scoreDiv.textContent = `¡Felicitaciones! Has obtenido ${correctAnswers}/${totalQuestions}`;
                } else {
                  scoreDiv.className = 'quiz-score partial';
                  scoreDiv.textContent = `¡Sigue intentando! Has obtenido ${correctAnswers}/${totalQuestions}`;
                }
              }
            });
          }

        } catch (error) {
          console.error('Error al cargar el quiz:', error);
          quizTitle.textContent = 'Error al cargar el cuestionario';
          quizQuestions.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
        }
      }

      // Asegurarse de que el script se ejecute después de que el DOM esté cargado
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initQuiz);
      } else {
        initQuiz();
      }
    })();
  </script>
</div>
{% endif %}
